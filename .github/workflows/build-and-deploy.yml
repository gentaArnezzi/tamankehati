name: CI/CD - Build and Deploy

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    # Only ignore documentation and config files, not code changes
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'README.md'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., v1.0.7)'
        required: true
        default: 'latest'
        type: string

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_USERNAME: ${{ secrets.GHCR_NAMESPACE || github.repository_owner }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/tamankehati' }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '5617' }}
  DOCKER_COMPOSE_FILE: docker-compose.pull.no-nginx.yml
  APP_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://tamankehati.tspdigital.id' }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://tamankehati.tspdigital.id' }}
  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://tamankehati.tspdigital.id' }}
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22.x"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  test:
    name: Run Critical Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run backend health test
        working-directory: apps/backend
        run: |
          echo "Running backend health check test..."
          pytest tests/test_health.py -v || {
            echo "❌ Backend health test failed"
            exit 1
          }
          echo "✅ Backend health test passed"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Normalize public URLs
        id: public_urls
        run: |
          API_URL="${NEXT_PUBLIC_API_URL%/}"
          API_URL="${API_URL%/api/v1}"
          API_URL="${API_URL%/api}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "APP_BASE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: |
          echo "Installing frontend dependencies..."
          npm ci || {
            echo "❌ npm ci failed"
            exit 1
          }

      - name: Build frontend (verification)
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.public_urls.outputs.api_url }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.public_urls.outputs.site_url }}
        run: |
          echo "Building frontend for verification..."
          npm run build || {
            echo "❌ Frontend build failed"
            exit 1
          }
          echo "✅ Frontend build verification passed"

      - name: Test summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All Critical Tests Passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Backend health test: PASSED"
          echo "✅ Frontend build verification: PASSED"
          echo ""
          echo "Ready to proceed with build and deployment."

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Get start timestamp
        id: start_time
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%d %b %Y, %H:%M WIB')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Notify deployment start
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            🟡 <b>DEPLOYMENT STARTED</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            👤 <b>Triggered by:</b> @${{ github.actor }}
            
            🚀 <b>Action:</b> Build and Deploy via GitHub CI/CD
            
            📦 Building Docker image...
            
            ⏱ <b>Estimated Time:</b> ~10 minutes
            
            📅 <b>Started:</b> ${{ steps.start_time.outputs.timestamp }}
            
            #ci-cd #build #progress
    
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize public URLs
        id: public_urls
        run: |
          API_URL="${NEXT_PUBLIC_API_URL%/}"
          API_URL="${API_URL%/api/v1}"
          API_URL="${API_URL%/api}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "APP_BASE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Normalize registry namespace
        env:
          GHCR_NAMESPACE: ${{ secrets.GHCR_NAMESPACE }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY_NAMESPACE=$(printf '%s' "${GHCR_NAMESPACE:-$REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_USERNAME=$REGISTRY_NAMESPACE" >> $GITHUB_ENV
          echo "Using registry namespace: $REGISTRY_NAMESPACE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.public_urls.outputs.api_url }}
            NEXT_PUBLIC_SITE_URL=${{ steps.public_urls.outputs.site_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Images Built and Pushed Successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🐳 Backend Image:"
          echo "   ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "🌐 Frontend Image:"
          echo "   ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "📦 Tag: ${{ env.IMAGE_TAG }}"

      - name: Notify build success
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ✅ <b>Docker Images Built Successfully</b>
            
            🐳 <b>Backend:</b> <code>${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend:${{ env.IMAGE_TAG }}</code>
            
            🌐 <b>Frontend:</b> <code>${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend:${{ env.IMAGE_TAG }}</code>
            
            🚀 Deploying to server...

      - name: Get failure timestamp
        if: failure()
        id: failure_time
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%d %b %Y, %H:%M WIB')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Notify build failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ❌ <b>DEPLOYMENT FAILED</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🔁 <b>Environment:</b> Production
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            📦 <b>Commit:</b> ${{ github.event.head_commit.message || format('{0}', github.sha) }}
            
            👤 <b>Triggered by:</b> @${{ github.actor }}
            
            📅 <b>Time:</b> ${{ steps.failure_time.outputs.timestamp }}
            
            🧩 <b>Error:</b> Container build failed at step "npm run build"
            
            💡 <b>Hint:</b> Check build logs in GitHub Actions → <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Logs</a>
            
            #ci-cd #deployment #failed

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    outputs:
      deployment_status: ${{ steps.deploy_step.outcome }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize public URLs
        id: public_urls
        run: |
          API_URL="${NEXT_PUBLIC_API_URL%/}"
          API_URL="${API_URL%/api/v1}"
          API_URL="${API_URL%/api}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "APP_BASE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Check deployment prerequisites
        id: check_prereqs
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "⚠️ Deployment secrets not configured. Skipping deployment."
            echo "Configure DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY in repository settings"
            echo "deploy_skipped=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Deployment prerequisites met"
            echo "deploy_skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Deployment skipped notice
        if: steps.check_prereqs.outputs.deploy_skipped == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  Deployment Skipped"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "GitHub Secrets not configured yet."
          echo ""
          echo "To enable auto-deployment:"
          echo "1. Go to repository Settings → Secrets and variables → Actions"
          echo "2. Add these secrets:"
          echo "   - DEPLOY_HOST: 103.125.91.16"
          echo "   - DEPLOY_PORT: 5617"
          echo "   - DEPLOY_USER: ubuntu"
          echo "   - DEPLOY_SSH_KEY: (raw SSH private key content, not the server password)"
          echo "   - GHCR_NAMESPACE: $(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]') (optional)"
          echo "   - GHCR_USERNAME: (optional, for server-side ghcr login)"
          echo "   - GHCR_TOKEN: (optional, if GHCR package is private)"
          echo "3. Push to main branch again"

      - name: Normalize registry namespace
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          GHCR_NAMESPACE: ${{ secrets.GHCR_NAMESPACE }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY_NAMESPACE=$(printf '%s' "${GHCR_NAMESPACE:-$REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_USERNAME=$REGISTRY_NAMESPACE" >> $GITHUB_ENV
          echo "Using registry namespace: $REGISTRY_NAMESPACE"

      - name: Setup SSH key
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519_tmp
          perl -pe 's/\\n/\n/g; s/\\r/\r/g' ~/.ssh/id_ed25519_tmp > ~/.ssh/id_ed25519
          rm -f ~/.ssh/id_ed25519_tmp
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null || { echo "SSH key validation failed"; exit 1; }

      - name: Add server to known hosts
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Server
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          GHCR_LOGIN_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GHCR_LOGIN_USER: ${{ secrets.GHCR_USERNAME || github.actor }}
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "GHCR_TOKEN='${GHCR_LOGIN_TOKEN}' GHCR_USER='${GHCR_LOGIN_USER}' DOCKER_USERNAME='${{ env.DOCKER_USERNAME }}' DOCKER_REGISTRY='${{ env.DOCKER_REGISTRY }}' COMPOSE_FILE='${{ env.DOCKER_COMPOSE_FILE }}' DEPLOY_PATH='${{ env.DEPLOY_PATH }}' DEPLOY_USER='${{ secrets.DEPLOY_USER }}' IMAGE_TAG='${{ env.IMAGE_TAG }}' NEXT_PUBLIC_API_URL='${{ steps.public_urls.outputs.api_url }}' NEXT_PUBLIC_SITE_URL='${{ steps.public_urls.outputs.site_url }}' bash" << 'DEPLOY_SCRIPT'
            set -e
            
            echo "=========================================="
            echo "Starting Deployment"
            echo "=========================================="
            echo ""
            
            # Create deployment directory if not exists
            echo "Creating deployment directory..."
            if [ ! -d "$DEPLOY_PATH" ]; then
              sudo mkdir -p "$DEPLOY_PATH"
              sudo chown -R $(whoami):$(whoami) "$DEPLOY_PATH"
              echo "Created directory: $DEPLOY_PATH"
            else
              echo "Directory already exists: $DEPLOY_PATH"
            fi
            
            cd "$DEPLOY_PATH"
            
            # Copy docker-compose file if not exists
            if [ ! -f "$COMPOSE_FILE" ]; then
              echo "Copying docker-compose file..."
              if [ -f "/home/$DEPLOY_USER/docker-compose.pull.no-nginx.yml" ]; then
                cp /home/$DEPLOY_USER/docker-compose.pull.no-nginx.yml "$COMPOSE_FILE"
              elif [ -f "docker-compose.pull.no-nginx.yml" ]; then
                cp docker-compose.pull.no-nginx.yml "$COMPOSE_FILE"
              else
                echo "docker-compose.pull.no-nginx.yml not found!"
                exit 1
              fi
            fi
            
            # Login to GHCR (required for private packages)
            echo "Logging into GitHub Container Registry..."
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login "$DOCKER_REGISTRY" -u "$GHCR_USER" --password-stdin 2>&1
            fi
            
            # Create .env file if not exists
            echo "Setting up environment variables..."
            if [ ! -f .env ]; then
              cat > .env << ENVEOF
# Docker Registry Configuration
DOCKER_REGISTRY=$$DOCKER_REGISTRY
DOCKER_USERNAME=$$DOCKER_USERNAME
IMAGE_TAG=$$IMAGE_TAG

# Environment Configuration
NEXT_PUBLIC_API_URL=$$NEXT_PUBLIC_SITE_URL
NEXT_PUBLIC_SITE_URL=$$NEXT_PUBLIC_SITE_URL

# Database Configuration (use existing values if available)
POSTGRES_DB=kehati_db
POSTGRES_USER=kehati_user
POSTGRES_PASSWORD=kehati_password

# Security
SECRET_KEY=changeme-production-secret-key-min-32-chars
ALGORITHM=HS256
ACCESS_TOKEN_EXPIRE_MINUTES=30

# CORS
CORS_ORIGINS=$$NEXT_PUBLIC_SITE_URL

# Backend
BACKEND_PORT=8000
FRONTEND_PORT=3001

# Environment
ENVIRONMENT=production
DEBUG=false

# Ollama
OLLAMA_MODEL=qwen2:1.5b
ENVEOF
              echo "Created .env file"
            else
              echo ".env file already exists"
              # Update IMAGE_TAG in existing .env
              if grep -q "^IMAGE_TAG=" .env; then
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env
              else
                echo "IMAGE_TAG=$IMAGE_TAG" >> .env
              fi
            fi
            
            # Pull latest images
            echo "Pulling Docker images..."
            export IMAGE_TAG=$IMAGE_TAG
            docker compose -f "$COMPOSE_FILE" pull
            
            # Stop existing containers
            echo "Stopping existing containers..."
            docker compose -f "$COMPOSE_FILE" down --timeout 30 || true
            
            # Start services
            echo "Starting services..."
            docker compose -f "$COMPOSE_FILE" up -d
            
            # Wait for services to be ready
            echo "Waiting for services to initialize..."
            sleep 15
            
            echo ""
            echo "Deployment completed successfully!"
            echo "Deployed images with tag: $IMAGE_TAG"
          DEPLOY_SCRIPT

      - name: Verify deployment
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "Verifying deployment..."
            
            BACKEND_URL="http://localhost:8000/health"
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $BACKEND_URL > /dev/null 2>&1; then
                echo "Backend health check passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "Service not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            echo "Backend health check failed"
            exit 1
          EOF

      - name: Get current tag for rollback
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: current_tag
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            if [ -f .env ] && grep -q "^IMAGE_TAG=" .env; then
              grep "^IMAGE_TAG=" .env | cut -d'=' -f2
            else
              echo "latest"
            fi
          EOF > /tmp/current_tag.txt
          CUR_TAG=$(cat /tmp/current_tag.txt | tr -d '\n')
          echo "tag=$CUR_TAG" >> $GITHUB_OUTPUT
          echo "Current deployed tag: $CUR_TAG"

      - name: Rollback to previous image
        if: failure() && steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          GHCR_LOGIN_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GHCR_LOGIN_USER: ${{ secrets.GHCR_USERNAME || github.actor }}
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "GHCR_TOKEN='${GHCR_LOGIN_TOKEN}' GHCR_USER='${GHCR_LOGIN_USER}' DOCKER_USERNAME='${{ env.DOCKER_USERNAME }}' DOCKER_REGISTRY='${{ env.DOCKER_REGISTRY }}' COMPOSE_FILE='${{ env.DOCKER_COMPOSE_FILE }}' DEPLOY_PATH='${{ env.DEPLOY_PATH }}' bash" << 'ROLLBACK_SCRIPT'
            set +e
            cd "$DEPLOY_PATH"
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Starting Rollback"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            # Get previous tag from .env backup or use latest
            if [ -f .env ]; then
              # Try to get previous tag from git history or use latest
              PREVIOUS_TAG="latest"
              
              # Check if we can find a previous tag in git history
              if [ -d ".git" ]; then
                PREVIOUS_ENV=$(git show HEAD:.env 2>/dev/null | grep "^IMAGE_TAG=" | cut -d'=' -f2 || echo "")
                if [ -n "$PREVIOUS_ENV" ]; then
                  PREVIOUS_TAG="$PREVIOUS_ENV"
                fi
              fi
              
              echo "📦 Rolling back to: $PREVIOUS_TAG"
              
              # Update .env with previous tag
              if grep -q "^IMAGE_TAG=" .env; then
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$PREVIOUS_TAG|" .env
              else
                echo "IMAGE_TAG=$PREVIOUS_TAG" >> .env
              fi
              
              echo "✅ Updated IMAGE_TAG=$PREVIOUS_TAG"
            else
              PREVIOUS_TAG="latest"
              echo "⚠️ No .env file found, using 'latest' tag"
            fi
            
            # Login to GHCR (required for private packages)
            echo "🔑 Logging into GitHub Container Registry..."
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login "$DOCKER_REGISTRY" -u "$GHCR_USER" --password-stdin 2>&1
            fi
            
            # Pull previous Docker images
            echo "🐳 Pulling previous Docker images..."
            export IMAGE_TAG=$PREVIOUS_TAG
            export DOCKER_USERNAME DOCKER_REGISTRY
            
            docker compose -f "$COMPOSE_FILE" pull backend frontend || {
              echo "⚠️ Failed to pull previous images, trying 'latest' tag..."
              export IMAGE_TAG=latest
              docker compose -f "$COMPOSE_FILE" pull backend frontend || {
                echo "❌ Failed to pull images"
                exit 1
              }
            }
            
            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker compose -f "$COMPOSE_FILE" down --timeout 30 || true
            
            # Start services with previous image
            echo "▶️  Starting services with previous image..."
            docker compose -f "$COMPOSE_FILE" up -d || {
              echo "❌ Failed to start services"
              exit 1
            }
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to initialize..."
            sleep 15
            
            echo ""
            echo "✅ Rollback completed!"
            echo "📦 Rolled back to: $PREVIOUS_TAG"
          ROLLBACK_SCRIPT

      - name: Verify rollback
        if: failure() && steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "🔍 Verifying rollback..."
            
            BACKEND_URL="http://localhost:8000/health"
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $BACKEND_URL > /dev/null 2>&1; then
                echo "✅ Rollback verification passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Service not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            echo "⚠️ Rollback verification failed, but rollback completed"
            exit 0
          EOF

      - name: Get previous tag for rollback notification
        if: failure() && steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: previous_tag_notify
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            if [ -f .env ] && grep -q "^IMAGE_TAG=" .env; then
              grep "^IMAGE_TAG=" .env | cut -d'=' -f2
            else
              echo "latest"
            fi
          EOF > /tmp/prev_tag_notify.txt
          PREV_TAG=$(cat /tmp/prev_tag_notify.txt | tr -d '\n')
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Get rollback timestamp
        if: failure() && steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: rollback_time
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%d %b %Y, %H:%M WIB')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Notify rollback
        if: failure() && steps.check_prereqs.outputs.deploy_skipped == 'false' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ⚠️ <b>ROLLBACK INITIATED</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            ⏱ <b>Triggered automatically</b> after failed deployment
            
            📦 <b>Reverting to previous stable build:</b> ${{ steps.previous_tag_notify.outputs.tag || 'latest' }}
            
            📅 <b>Time:</b> ${{ steps.rollback_time.outputs.timestamp }}
            
            🚦 <b>Status:</b> Rollback completed successfully
            
            #ci-cd #rollback #stability
