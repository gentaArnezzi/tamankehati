name: CI/CD - Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'apps/frontend/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., v1.0.7)'
        required: true
        default: 'latest'
        type: string

env:
  DOCKER_REGISTRY: docker.io
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME || 'arnezzi' }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '~/dasmap_prod/apps/tamankehati' }}
  DOCKER_COMPOSE_FILE: docker-compose.pull.no-nginx.yml
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://38.47.93.167:8080' }}

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Images Built and Pushed Successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🐳 Backend Image:"
          echo "   ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "🌐 Frontend Image:"
          echo "   ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "📦 Tag: ${{ env.IMAGE_TAG }}"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment prerequisites
        id: check_prereqs
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "⚠️ Deployment secrets not configured. Skipping deployment."
            echo "Configure DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY in repository settings"
            echo "deploy_skipped=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Deployment prerequisites met"
            echo "deploy_skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Deployment skipped notice
        if: steps.check_prereqs.outputs.deploy_skipped == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  Deployment Skipped"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "GitHub Secrets not configured yet."
          echo ""
          echo "To enable auto-deployment:"
          echo "1. Go to repository Settings → Secrets and variables → Actions"
          echo "2. Add these secrets:"
          echo "   - DEPLOY_HOST: 38.47.93.167"
          echo "   - DEPLOY_USER: ubuntu"
          echo "   - DEPLOY_SSH_KEY: (your SSH private key)"
          echo "   - DOCKER_PASSWORD: (your Docker Hub password/token)"
          echo "   - DOCKER_USERNAME: arnezzi (optional, defaults to arnezzi)"
          echo "3. Push to main branch again"

      - name: Setup SSH
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo '✅ SSH connection successful'"

      - name: Deploy to server
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << DEPLOY_SCRIPT
            set -e
            cd ${{ env.DEPLOY_PATH }}
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Starting Deployment"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "📦 Image Tag: ${{ env.IMAGE_TAG }}"
            echo ""
            
            # Update .env file with new image tag
            if [ -f .env ]; then
              echo "📝 Updating IMAGE_TAG in .env..."
              if grep -q "^IMAGE_TAG=" .env; then
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${{ env.IMAGE_TAG }}|" .env
              else
                echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> .env
              fi
              echo "✅ Updated IMAGE_TAG=${{ env.IMAGE_TAG }}"
            fi
            
            # Pull latest code (optional, for config updates)
            if [ -d ".git" ]; then
              echo "📥 Pulling latest code..."
              git fetch origin main || true
              git checkout main || true
              git pull origin main || echo "⚠️  Git pull failed, continuing..."
            fi
            
            # Pull latest Docker images
            echo "🐳 Pulling latest Docker images..."
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} pull backend frontend || {
              echo "❌ Failed to pull images"
              exit 1
            }
            
            # Stop existing containers gracefully
            echo "🛑 Stopping existing containers..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} down --timeout 30 || true
            
            # Start services
            echo "▶️  Starting services..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to initialize..."
            sleep 15
            
            # Run database migrations
            echo "🗄️  Running database migrations..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} exec -T backend alembic upgrade head || echo "⚠️  Migration failed, but continuing..."
            
            echo ""
            echo "✅ Deployment completed!"
            DEPLOY_SCRIPT

      - name: Health check - Backend
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "🏥 Checking backend health..."
            
            BACKEND_URL="http://localhost:8000/health"
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $BACKEND_URL > /dev/null; then
                echo "✅ Backend health check passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Backend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            echo "❌ Backend health check failed after $MAX_RETRIES attempts"
            exit 1
          EOF

      - name: Health check - Frontend
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "🌐 Checking frontend health..."
            
            FRONTEND_URL="http://localhost:3000"
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $FRONTEND_URL > /dev/null; then
                echo "✅ Frontend health check passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Frontend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            echo "❌ Frontend health check failed after $MAX_RETRIES attempts"
            exit 1
          EOF

      - name: Deployment summary
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment Completed Successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Image Tag: ${{ env.IMAGE_TAG }}"
          echo "🐳 Backend: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend:${{ env.IMAGE_TAG }}"
          echo "🌐 Frontend: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "🌐 Application URL: http://38.47.93.167:8080"
          echo "🏥 Health Check: http://38.47.93.167:8080/api/health"
          echo ""
          echo "All services should be running and healthy."

