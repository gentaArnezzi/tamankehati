name: CI/CD - Build and Deploy

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
    # Only ignore documentation and config files, not code changes
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'README.md'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (e.g., v1.0.7)'
        required: true
        default: 'latest'
        type: string

env:
  DOCKER_REGISTRY: ghcr.io
  DOCKER_USERNAME: ${{ secrets.GHCR_NAMESPACE || github.repository_owner }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/tamankehati' }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '5617' }}
  DOCKER_COMPOSE_FILE: docker-compose.pull.no-nginx.yml
  APP_BASE_URL: ${{ secrets.APP_BASE_URL || 'https://tamankehati.tspdigital.id' }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://tamankehati.tspdigital.id' }}
  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://tamankehati.tspdigital.id' }}
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22.x"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  test:
    name: Run Critical Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: apps/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run backend health test
        working-directory: apps/backend
        run: |
          echo "Running backend health check test..."
          pytest tests/test_health.py -v || {
            echo "❌ Backend health test failed"
            exit 1
          }
          echo "✅ Backend health test passed"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Normalize public URLs
        id: public_urls
        run: |
          API_URL="${NEXT_PUBLIC_API_URL%/}"
          API_URL="${API_URL%/api/v1}"
          API_URL="${API_URL%/api}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "APP_BASE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: |
          echo "Installing frontend dependencies..."
          npm ci || {
            echo "❌ npm ci failed"
            exit 1
          }

      - name: Build frontend (verification)
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.public_urls.outputs.api_url }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.public_urls.outputs.site_url }}
        run: |
          echo "Building frontend for verification..."
          npm run build || {
            echo "❌ Frontend build failed"
            exit 1
          }
          echo "✅ Frontend build verification passed"

      - name: Test summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ All Critical Tests Passed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Backend health test: PASSED"
          echo "✅ Frontend build verification: PASSED"
          echo ""
          echo "Ready to proceed with build and deployment."

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Get start timestamp
        id: start_time
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%d %b %Y, %H:%M WIB')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Notify deployment start
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            🟡 <b>DEPLOYMENT STARTED</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            👤 <b>Triggered by:</b> @${{ github.actor }}
            
            🚀 <b>Action:</b> Build and Deploy via GitHub CI/CD
            
            📦 Building Docker image...
            
            ⏱ <b>Estimated Time:</b> ~10 minutes
            
            📅 <b>Started:</b> ${{ steps.start_time.outputs.timestamp }}
            
            #ci-cd #build #progress
    
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize public URLs
        id: public_urls
        run: |
          API_URL="${NEXT_PUBLIC_API_URL%/}"
          API_URL="${API_URL%/api/v1}"
          API_URL="${API_URL%/api}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "APP_BASE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Normalize registry namespace
        env:
          GHCR_NAMESPACE: ${{ secrets.GHCR_NAMESPACE }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY_NAMESPACE=$(printf '%s' "${GHCR_NAMESPACE:-$REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_USERNAME=$REGISTRY_NAMESPACE" >> $GITHUB_ENV
          echo "Using registry namespace: $REGISTRY_NAMESPACE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          file: ./apps/frontend/Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.public_urls.outputs.api_url }}
            NEXT_PUBLIC_SITE_URL=${{ steps.public_urls.outputs.site_url }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Images Built and Pushed Successfully"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🐳 Backend Image:"
          echo "   ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "🌐 Frontend Image:"
          echo "   ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "📦 Tag: ${{ env.IMAGE_TAG }}"

      - name: Notify build success
        if: always() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ✅ <b>Docker Images Built Successfully</b>
            
            🐳 <b>Backend:</b> <code>${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend:${{ env.IMAGE_TAG }}</code>
            
            🌐 <b>Frontend:</b> <code>${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend:${{ env.IMAGE_TAG }}</code>
            
            🚀 Deploying to server...

      - name: Get failure timestamp
        if: failure()
        id: failure_time
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%d %b %Y, %H:%M WIB')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Notify build failure
        if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ❌ <b>DEPLOYMENT FAILED</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🔁 <b>Environment:</b> Production
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            📦 <b>Commit:</b> ${{ github.event.head_commit.message || format('{0}', github.sha) }}
            
            👤 <b>Triggered by:</b> @${{ github.actor }}
            
            📅 <b>Time:</b> ${{ steps.failure_time.outputs.timestamp }}
            
            🧩 <b>Error:</b> Container build failed at step "npm run build"
            
            💡 <b>Hint:</b> Check build logs in GitHub Actions → <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Logs</a>
            
            #ci-cd #deployment #failed

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    outputs:
      deployment_status: ${{ steps.deploy_step.outcome }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize public URLs
        id: public_urls
        run: |
          API_URL="${NEXT_PUBLIC_API_URL%/}"
          API_URL="${API_URL%/api/v1}"
          API_URL="${API_URL%/api}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "APP_BASE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Check deployment prerequisites
        id: check_prereqs
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "⚠️ Deployment secrets not configured. Skipping deployment."
            echo "Configure DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY in repository settings"
            echo "deploy_skipped=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Deployment prerequisites met"
            echo "deploy_skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Deployment skipped notice
        if: steps.check_prereqs.outputs.deploy_skipped == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  Deployment Skipped"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "GitHub Secrets not configured yet."
          echo ""
          echo "To enable auto-deployment:"
          echo "1. Go to repository Settings → Secrets and variables → Actions"
          echo "2. Add these secrets:"
          echo "   - DEPLOY_HOST: 103.125.91.16"
          echo "   - DEPLOY_PORT: 5617"
          echo "   - DEPLOY_USER: ubuntu"
          echo "   - DEPLOY_SSH_KEY: (raw SSH private key content, not the server password)"
          echo "   - GHCR_NAMESPACE: $(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]') (optional)"
          echo "   - GHCR_USERNAME: (optional, for server-side ghcr login)"
          echo "   - GHCR_TOKEN: (optional, if GHCR package is private)"
          echo "3. Push to main branch again"

      - name: Normalize registry namespace
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          GHCR_NAMESPACE: ${{ secrets.GHCR_NAMESPACE }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY_NAMESPACE=$(printf '%s' "${GHCR_NAMESPACE:-$REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_USERNAME=$REGISTRY_NAMESPACE" >> $GITHUB_ENV
          echo "Using registry namespace: $REGISTRY_NAMESPACE"

      - name: Setup SSH key
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" | perl -0pe 's/\r//g; s/\\n/\n/g' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Add server to known hosts
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo '✅ SSH connection successful'"

      - name: Save previous image tag
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: save_previous_tag
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            if [ -f .env ] && grep -q "^IMAGE_TAG=" .env; then
              PREVIOUS_TAG=$(grep "^IMAGE_TAG=" .env | cut -d'=' -f2)
              echo "$PREVIOUS_TAG"
            else
              echo "latest"
            fi
          EOF > /tmp/previous_tag.txt
          PREVIOUS_TAG=$(cat /tmp/previous_tag.txt | tr -d '\n')
          echo "previous_tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT
          echo "Previous IMAGE_TAG: $PREVIOUS_TAG"

      - name: Deploy to server
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: deploy_step
        env:
          GHCR_LOGIN_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GHCR_LOGIN_USER: ${{ secrets.GHCR_USERNAME || github.actor }}
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "GHCR_TOKEN='${GHCR_LOGIN_TOKEN}' GHCR_USER='${GHCR_LOGIN_USER}' IMAGE_TAG='${{ env.IMAGE_TAG }}' DOCKER_USERNAME='${{ env.DOCKER_USERNAME }}' DOCKER_REGISTRY='${{ env.DOCKER_REGISTRY }}' COMPOSE_FILE='${{ env.DOCKER_COMPOSE_FILE }}' DEPLOY_PATH='${{ env.DEPLOY_PATH }}' NEXT_PUBLIC_API_URL='${{ steps.public_urls.outputs.api_url }}' NEXT_PUBLIC_SITE_URL='${{ steps.public_urls.outputs.site_url }}' APP_BASE_URL='${{ steps.public_urls.outputs.site_url }}' bash" << 'DEPLOY_SCRIPT'
            set +e  # Don't exit on error, we'll handle errors manually
            cd "$DEPLOY_PATH"
            DEPLOY_SUCCESS=0
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Starting Deployment"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "📦 Image Tag: $IMAGE_TAG"
            echo ""
            
            # Update .env file with new image tag
            if [ -f .env ]; then
              echo "📝 Updating IMAGE_TAG in .env..."
              if grep -q "^IMAGE_TAG=" .env; then
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env
              else
                echo "IMAGE_TAG=$IMAGE_TAG" >> .env
              fi
              echo "✅ Updated IMAGE_TAG=$IMAGE_TAG"
              for pair in \
                "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" \
                "NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL" \
                "APP_BASE_URL=$APP_BASE_URL" \
                "CORS_ORIGINS=$APP_BASE_URL"; do
                key="${pair%%=*}"
                value="${pair#*=}"
                if grep -q "^${key}=" .env; then
                  sed -i "s|^${key}=.*|${key}=${value}|" .env
                else
                  echo "${key}=${value}" >> .env
                fi
              done
              echo "✅ Updated public URL env values"
            fi
            
            # Pull latest code (optional, for config updates)
            if [ -d ".git" ]; then
              echo "📥 Pulling latest code..."
              git fetch origin main || true
              git checkout main || true
              git pull origin main || echo "⚠️  Git pull failed, continuing..."
            fi
            
            # Login to GHCR (required for private packages)
            echo "🔑 Logging into GitHub Container Registry..."
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login "$DOCKER_REGISTRY" -u "$GHCR_USER" --password-stdin 2>&1
              if [ $? -eq 0 ]; then
                echo "✅ GHCR login successful"
              else
                echo "⚠️  GHCR login failed, will try pull anyway..."
              fi
            else
              echo "⚠️  No GHCR token provided, pull may fail for private packages"
            fi
            
            # Pull latest Docker images
            echo "🐳 Pulling latest Docker images..."
            export IMAGE_TAG DOCKER_USERNAME DOCKER_REGISTRY
            if docker compose -f "$COMPOSE_FILE" pull backend frontend; then
              echo "✅ Images pulled successfully"
            else
              echo "❌ Failed to pull images"
              DEPLOY_SUCCESS=1
            fi
            
            # Stop existing containers gracefully
            echo "🛑 Stopping existing containers..."
            docker compose -f "$COMPOSE_FILE" down --timeout 30 || true
            
            # Start services
            echo "▶️  Starting services..."
            if docker compose -f "$COMPOSE_FILE" up -d; then
              echo "✅ Services started"
            else
              echo "⚠️  Service start had issues, but continuing..."
              DEPLOY_SUCCESS=1
            fi
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to initialize..."
            sleep 20
            
            # Run database migrations
            echo "🗄️  Running database migrations..."
            docker compose -f "$COMPOSE_FILE" exec -T backend alembic upgrade head || echo "⚠️  Migration failed, but continuing..."
            
            # Verify the built frontend no longer contains stale public endpoints.
            echo "🔎 Verifying frontend bundle URL configuration..."
            FRONTEND_CONTAINER=$(docker compose -f "$COMPOSE_FILE" ps -q frontend 2>/dev/null || docker ps --filter 'name=tamankehati-frontend' -q)
            if [ -n "$FRONTEND_CONTAINER" ]; then
              docker exec "$FRONTEND_CONTAINER" sh -lc '
                if grep -R -q -E "103\.125\.91\.16:8080|127\.0\.0\.1:8081" /app/.next 2>/dev/null; then
                  echo "❌ Stale frontend endpoint found in built bundle"
                  exit 1
                fi
                echo "✅ No stale frontend endpoint found"
              ' || DEPLOY_SUCCESS=1
            else
              echo "⚠️ Frontend container not found, skipping bundle verification"
            fi
            
            echo ""
            if [ $DEPLOY_SUCCESS -eq 0 ]; then
              echo "✅ Deployment completed!"
            else
              echo "⚠️  Deployment completed with warnings"
            fi
            exit 0  # Always exit 0 to prevent workflow failure
          DEPLOY_SCRIPT

      - name: Health check - Backend
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "🏥 Checking backend health..."
            
            cd "${{ env.DEPLOY_PATH }}"
            BACKEND_PORT=$(grep -E '^BACKEND_PORT=' .env 2>/dev/null | tail -n 1 | cut -d '=' -f2-)
            BACKEND_URL="http://127.0.0.1:${BACKEND_PORT:-8000}/health"
            MAX_RETRIES=10
            RETRY_COUNT=0
            HEALTH_CHECK_PASSED=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $BACKEND_URL > /dev/null 2>&1; then
                echo "✅ Backend health check passed"
                HEALTH_CHECK_PASSED=1
                break
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Backend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            if [ $HEALTH_CHECK_PASSED -eq 0 ]; then
              echo "❌ Backend health check failed after $MAX_RETRIES attempts"
              exit 1
            fi
            exit 0
          EOF

      - name: Health check - Frontend
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        continue-on-error: true
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "🌐 Checking frontend health..."
            
            cd "${{ env.DEPLOY_PATH }}"
            FRONTEND_PORT=$(grep -E '^FRONTEND_PORT=' .env 2>/dev/null | tail -n 1 | cut -d '=' -f2-)
            FRONTEND_URL="http://127.0.0.1:${FRONTEND_PORT:-3000}"
            MAX_RETRIES=5
            RETRY_COUNT=0
            HEALTH_CHECK_PASSED=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $FRONTEND_URL > /dev/null 2>&1; then
                echo "✅ Frontend health check passed"
                HEALTH_CHECK_PASSED=1
                break
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Frontend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 3
            done
            
            if [ $HEALTH_CHECK_PASSED -eq 0 ]; then
              echo "⚠️ Frontend health check failed (non-critical, continuing...)"
              echo "Frontend may not be running or may need more time to start"
            fi
            exit 0
          EOF

      - name: Deployment summary
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment Completed Successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Image Tag: ${{ env.IMAGE_TAG }}"
          echo "🐳 Backend: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-backend:${{ env.IMAGE_TAG }}"
          echo "🌐 Frontend: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/tamankehati-frontend:${{ env.IMAGE_TAG }}"
          echo ""
          echo "🌐 Application URL: ${{ steps.public_urls.outputs.site_url }}"
          echo "🏥 Health Check: ${{ steps.public_urls.outputs.site_url }}/health"
          echo ""
          echo "All services should be running and healthy."

      - name: Get deployment timestamp
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: deployment_time
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%d %b %Y, %H:%M WIB')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Notify deployment success
        if: steps.check_prereqs.outputs.deploy_skipped == 'false' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ✅ <b>DEPLOYMENT SUCCESSFUL</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🔁 <b>Environment:</b> Production
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            📦 <b>Commit:</b> ${{ github.event.head_commit.message || format('{0}', github.sha) }}
            
            👤 <b>Triggered by:</b> @${{ github.actor }}
            
            ⏱ <b>Duration:</b> ~10 minutes
            
            📅 <b>Time:</b> ${{ steps.deployment_time.outputs.timestamp }}
            
            🚀 <b>Status:</b> Successfully deployed to server (103.125.91.16)
            
            🩺 <b>Health Check:</b> Passed ✅
            
            #ci-cd #deployment #success

      - name: Notify deployment failure
        if: failure() && steps.check_prereqs.outputs.deploy_skipped == 'false' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ❌ <b>DEPLOYMENT FAILED</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🔁 <b>Environment:</b> Production
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            📦 <b>Commit:</b> ${{ github.event.head_commit.message || format('{0}', github.sha) }}
            
            👤 <b>Triggered by:</b> @${{ github.actor }}
            
            ⏱ <b>Duration:</b> ~10 minutes
            
            📅 <b>Time:</b> ${{ steps.deployment_time.outputs.timestamp }}
            
            🧩 <b>Error:</b> Deployment failed on server
            
            💡 <b>Hint:</b> Check deployment logs in GitHub Actions → <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">View Logs</a>
            
            #ci-cd #deployment #failed

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Normalize public URLs
        id: public_urls
        run: |
          API_URL="${NEXT_PUBLIC_API_URL%/}"
          API_URL="${API_URL%/api/v1}"
          API_URL="${API_URL%/api}"
          SITE_URL="${NEXT_PUBLIC_SITE_URL%/}"
          SITE_URL="${SITE_URL%/api/v1}"
          SITE_URL="${SITE_URL%/api}"
          echo "NEXT_PUBLIC_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "APP_BASE_URL=$SITE_URL" >> "$GITHUB_ENV"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "site_url=$SITE_URL" >> "$GITHUB_OUTPUT"

      - name: Check deployment prerequisites
        id: check_prereqs
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "⚠️ Deployment secrets not configured. Skipping verification."
            echo "deploy_skipped=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Verification prerequisites met"
            echo "deploy_skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify backend health (external)
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          echo "🏥 Verifying backend health from external URL..."
          
          BACKEND_URL="${{ steps.public_urls.outputs.site_url }}/health"
          MAX_RETRIES=15
          RETRY_COUNT=0
          HEALTH_CHECK_PASSED=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Backend health check passed (HTTP $HTTP_CODE)"
              HEALTH_CHECK_PASSED=1
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ Backend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES) [HTTP $HTTP_CODE]"
            sleep 5
          done
          
          if [ $HEALTH_CHECK_PASSED -eq 0 ]; then
            echo "❌ Backend health check failed after $MAX_RETRIES attempts"
            exit 1
          fi

      - name: Verify public API endpoints
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          echo "🔍 Verifying public API endpoints..."
          
          BASE_URL="${{ steps.public_urls.outputs.site_url }}"
          ENDPOINTS=(
            "/api/public/parks/"
            "/api/public/stats/"
          )
          
          FAILED_ENDPOINTS=0
          
          for endpoint in "${ENDPOINTS[@]}"; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL$endpoint" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ $endpoint - OK (HTTP $HTTP_CODE)"
            else
              echo "❌ $endpoint - FAILED (HTTP $HTTP_CODE)"
              FAILED_ENDPOINTS=$((FAILED_ENDPOINTS + 1))
            fi
          done
          
          if [ $FAILED_ENDPOINTS -gt 0 ]; then
            echo "❌ $FAILED_ENDPOINTS endpoint(s) failed verification"
            exit 1
          fi
          
          echo "✅ All public API endpoints verified"

      - name: Verify frontend (external)
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        continue-on-error: true
        run: |
          echo "🌐 Verifying frontend from external URL..."
          
          FRONTEND_URL="${{ steps.public_urls.outputs.site_url }}"
          MAX_RETRIES=10
          RETRY_COUNT=0
          FRONTEND_CHECK_PASSED=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || echo "000")
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "304" ]; then
              echo "✅ Frontend verified (HTTP $HTTP_CODE)"
              FRONTEND_CHECK_PASSED=1
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ Frontend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES) [HTTP $HTTP_CODE]"
            sleep 3
          done
          
          if [ $FRONTEND_CHECK_PASSED -eq 0 ]; then
            echo "⚠️ Frontend verification failed (non-critical)"
            echo "Frontend may need more time to start or may not be accessible"
          fi

      - name: Verification summary
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment Verification Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✅ Backend health check: PASSED"
          echo "✅ Public API endpoints: VERIFIED"
          echo "✅ Frontend: CHECKED"
          echo ""
          echo "🌐 Application is live and accessible:"
          echo "   ${{ steps.public_urls.outputs.site_url }}"

  rollback-deployment:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure() && needs.deploy.result == 'failure' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment prerequisites
        id: check_prereqs
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "⚠️ Deployment secrets not configured. Cannot perform rollback."
            echo "deploy_skipped=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Rollback prerequisites met"
            echo "deploy_skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Normalize registry namespace
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          GHCR_NAMESPACE: ${{ secrets.GHCR_NAMESPACE }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          REGISTRY_NAMESPACE=$(printf '%s' "${GHCR_NAMESPACE:-$REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "DOCKER_USERNAME=$REGISTRY_NAMESPACE" >> $GITHUB_ENV
          echo "Using registry namespace: $REGISTRY_NAMESPACE"

      - name: Setup SSH key
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" | perl -0pe 's/\r//g; s/\\n/\n/g' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Add server to known hosts
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Rollback to previous image
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          GHCR_LOGIN_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          GHCR_LOGIN_USER: ${{ secrets.GHCR_USERNAME || github.actor }}
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "GHCR_TOKEN='${GHCR_LOGIN_TOKEN}' GHCR_USER='${GHCR_LOGIN_USER}' DOCKER_USERNAME='${{ env.DOCKER_USERNAME }}' DOCKER_REGISTRY='${{ env.DOCKER_REGISTRY }}' COMPOSE_FILE='${{ env.DOCKER_COMPOSE_FILE }}' DEPLOY_PATH='${{ env.DEPLOY_PATH }}' bash" << 'ROLLBACK_SCRIPT'
            set +e
            cd "$DEPLOY_PATH"
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🔄 Starting Rollback"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            # Get previous tag from .env backup or use latest
            if [ -f .env ]; then
              # Try to get previous tag from git history or use latest
              PREVIOUS_TAG="latest"
              
              # Check if we can find a previous tag in git history
              if [ -d ".git" ]; then
                PREVIOUS_ENV=$(git show HEAD:.env 2>/dev/null | grep "^IMAGE_TAG=" | cut -d'=' -f2 || echo "")
                if [ -n "$PREVIOUS_ENV" ]; then
                  PREVIOUS_TAG="$PREVIOUS_ENV"
                fi
              fi
              
              echo "📦 Rolling back to: $PREVIOUS_TAG"
              
              # Update .env with previous tag
              if grep -q "^IMAGE_TAG=" .env; then
                sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$PREVIOUS_TAG|" .env
              else
                echo "IMAGE_TAG=$PREVIOUS_TAG" >> .env
              fi
              
              echo "✅ Updated IMAGE_TAG=$PREVIOUS_TAG"
            else
              PREVIOUS_TAG="latest"
              echo "⚠️ No .env file found, using 'latest' tag"
            fi
            
            # Login to GHCR (required for private packages)
            echo "🔑 Logging into GitHub Container Registry..."
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login "$DOCKER_REGISTRY" -u "$GHCR_USER" --password-stdin 2>&1
            fi
            
            # Pull previous Docker images
            echo "🐳 Pulling previous Docker images..."
            export IMAGE_TAG=$PREVIOUS_TAG
            export DOCKER_USERNAME DOCKER_REGISTRY
            
            docker compose -f "$COMPOSE_FILE" pull backend frontend || {
              echo "⚠️ Failed to pull previous images, trying 'latest' tag..."
              export IMAGE_TAG=latest
              docker compose -f "$COMPOSE_FILE" pull backend frontend || {
                echo "❌ Failed to pull images"
                exit 1
              }
            }
            
            # Stop existing containers
            echo "🛑 Stopping existing containers..."
            docker compose -f "$COMPOSE_FILE" down --timeout 30 || true
            
            # Start services with previous image
            echo "▶️  Starting services with previous image..."
            docker compose -f "$COMPOSE_FILE" up -d || {
              echo "❌ Failed to start services"
              exit 1
            }
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to initialize..."
            sleep 15
            
            echo ""
            echo "✅ Rollback completed!"
            echo "📦 Rolled back to: $PREVIOUS_TAG"
          ROLLBACK_SCRIPT

      - name: Verify rollback
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "🔍 Verifying rollback..."
            
            BACKEND_URL="http://localhost:8000/health"
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $BACKEND_URL > /dev/null 2>&1; then
                echo "✅ Rollback verification passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Service not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            echo "⚠️ Rollback verification failed, but rollback completed"
            exit 0
          EOF

      - name: Get previous tag for rollback notification
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: previous_tag_notify
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd ${{ env.DEPLOY_PATH }}
            if [ -f .env ] && grep -q "^IMAGE_TAG=" .env; then
              grep "^IMAGE_TAG=" .env | cut -d'=' -f2
            else
              echo "latest"
            fi
          EOF > /tmp/prev_tag_notify.txt
          PREV_TAG=$(cat /tmp/prev_tag_notify.txt | tr -d '\n')
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Get rollback timestamp
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        id: rollback_time
        run: |
          TIMESTAMP=$(TZ='Asia/Jakarta' date +'%d %b %Y, %H:%M WIB')
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Notify rollback
        if: steps.check_prereqs.outputs.deploy_skipped == 'false' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        uses: appleboy/telegram-action@master
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          format: html
          message: |
            ⚠️ <b>ROLLBACK INITIATED</b>
            
            🏷️ <b>Project:</b> Taman Kehati Web Portal
            
            🌿 <b>Branch:</b> ${{ github.ref_name }}
            
            ⏱ <b>Triggered automatically</b> after failed deployment
            
            📦 <b>Reverting to previous stable build:</b> ${{ steps.previous_tag_notify.outputs.tag || 'latest' }}
            
            📅 <b>Time:</b> ${{ steps.rollback_time.outputs.timestamp }}
            
            🚦 <b>Status:</b> Rollback completed successfully
            
            #ci-cd #rollback #stability
