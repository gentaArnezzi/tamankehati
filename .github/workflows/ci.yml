name: CI - Tests & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22.x"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term || true
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./apps/backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 isort mypy

      - name: Run Black (code formatting check)
        run: |
          black --check --diff . || true
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff . || true
        continue-on-error: true

      - name: Run Flake8 (linting)
        run: |
          flake8 . --max-line-length=88 --extend-ignore=E203,W503 --exclude=venv,__pycache__,migrations || true
        continue-on-error: true

      - name: Run MyPy (type checking)
        run: |
          mypy . --ignore-missing-imports --no-strict-optional || true
        continue-on-error: true

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true
        continue-on-error: true

      - name: Check Prettier formatting
        run: npm run format:check || true
        continue-on-error: true

  frontend-type-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: npm run type-check || true
        continue-on-error: true

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify backend Dockerfile
        run: |
          docker build \
            --target production \
            --tag backend-test \
            -f apps/backend/Dockerfile \
            apps/backend
        continue-on-error: false

      - name: Set up Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Build frontend
        working-directory: apps/frontend
        run: |
          npm ci
          npm run build

      - name: Verify frontend Dockerfile
        run: |
          docker build \
            --target runner \
            --tag frontend-test \
            -f apps/frontend/Dockerfile \
            apps/frontend
        continue-on-error: false

  ci-success:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-lint, frontend-lint, frontend-type-check, build-verification]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "=== CI Job Results ==="
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Backend Lint: ${{ needs.backend-lint.result }}"
          echo "Frontend Lint: ${{ needs.frontend-lint.result }}"
          echo "Frontend Type Check: ${{ needs.frontend-type-check.result }}"
          echo "Build Verification: ${{ needs.build-verification.result }}"
          echo ""

          # Check if any critical job failed (not just warnings)
          if [ "${{ needs.build-verification.result }}" == "failure" ]; then
            echo "❌ Build verification failed - this is critical"
            exit 1
          fi

          # Allow warnings/errors in linting and type checking for now
          # but still report them
          if [ "${{ needs.backend-tests.result }}" == "failure" ]; then
            echo "⚠️  Backend tests had issues (check logs)"
          fi
          if [ "${{ needs.backend-lint.result }}" == "failure" ]; then
            echo "⚠️  Backend linting had issues (check logs)"
          fi
          if [ "${{ needs.frontend-lint.result }}" == "failure" ]; then
            echo "⚠️  Frontend linting had issues (check logs)"
          fi
          if [ "${{ needs.frontend-type-check.result }}" == "failure" ]; then
            echo "⚠️  Frontend type checking had issues (check logs)"
          fi

          echo "✅ CI pipeline completed (warnings are allowed)"
