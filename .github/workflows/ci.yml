name: CI - Tests & Linting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "22.x"

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term || true
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./apps/backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  backend-lint:
    name: Backend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 isort mypy

      - name: Run Black (code formatting check)
        run: |
          black --check --diff . || true
        continue-on-error: true

      - name: Run isort (import sorting check)
        run: |
          isort --check-only --diff . || true
        continue-on-error: true

      - name: Run Flake8 (linting)
        run: |
          flake8 . --max-line-length=88 --extend-ignore=E203,W503 --exclude=venv,__pycache__,migrations || true
        continue-on-error: true

      - name: Run MyPy (type checking)
        run: |
          mypy . --ignore-missing-imports --no-strict-optional || true
        continue-on-error: true

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          if npm run lint 2>&1 | tee eslint-output.log; then
            echo "✅ ESLint passed"
          else
            echo "⚠️ ESLint found issues (non-blocking)"
            cat eslint-output.log || true
          fi
        continue-on-error: true

      - name: Check Prettier formatting
        run: |
          if npm run format:check 2>&1 | tee prettier-output.log; then
            echo "✅ Prettier check passed"
          else
            echo "⚠️ Prettier found formatting issues (non-blocking)"
            cat prettier-output.log || true
          fi
        continue-on-error: true

  frontend-type-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type check
        run: |
          if npm run type-check 2>&1 | tee typecheck-output.log; then
            echo "✅ TypeScript type check passed"
          else
            echo "⚠️ TypeScript found type errors (non-blocking)"
            cat typecheck-output.log || true
          fi
        continue-on-error: true

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify backend Dockerfile
        run: |
          echo "Building backend Docker image..."
          docker build \
            --target production \
            --tag backend-test \
            -f apps/backend/Dockerfile \
            apps/backend || {
              echo "❌ Backend Docker build failed"
              exit 1
            }
          echo "✅ Backend Docker image built successfully"

      - name: Set up Node.js for frontend
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: |
          echo "Installing frontend dependencies..."
          npm ci || {
            echo "❌ npm ci failed"
            exit 1
          }

      - name: Build frontend
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://tamankehati.tspdigital.id' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://tamankehati.tspdigital.id' }}
        run: |
          echo "Building frontend..."
          # Build should succeed even with ESLint/TypeScript warnings (handled in next.config.js)
          npm run build || {
            echo "❌ Frontend build failed"
            exit 1
          }
          echo "✅ Frontend build completed"

      - name: Verify frontend Dockerfile
        run: |
          echo "Building frontend Docker image..."
          docker build \
            --target runner \
            --tag frontend-test \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL || 'https://tamankehati.tspdigital.id' }} \
            --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://tamankehati.tspdigital.id' }} \
            -f apps/frontend/Dockerfile \
            apps/frontend || {
              echo "❌ Frontend Docker build failed"
              exit 1
            }
          echo "✅ Frontend Docker image built successfully"

  ci-success:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend-tests, backend-lint, frontend-lint, frontend-type-check, build-verification]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "=== CI Job Results ==="
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Backend Lint: ${{ needs.backend-lint.result }}"
          echo "Frontend Lint: ${{ needs.frontend-lint.result }}"
          echo "Frontend Type Check: ${{ needs.frontend-type-check.result }}"
          echo "Build Verification: ${{ needs.build-verification.result }}"
          echo ""

          # Check if any critical job failed (not just warnings)
          # Build verification is critical - if it fails, CI fails
          # But we allow continue-on-error for warnings, so check for actual failures
          if [ "${{ needs.build-verification.result }}" == "failure" ]; then
            echo "❌ Build verification failed - this is critical"
            echo "Please check the build logs for actual errors"
            # Only fail if it's a real build failure, not just warnings
            # The build step should have continue-on-error for warnings
            exit 1
          fi

          # Allow warnings/errors in linting and type checking for now
          # but still report them
          # Note: With continue-on-error: true, these will show as "success" even if they have warnings
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "⚠️  Backend tests had issues (check logs)"
          fi
          if [ "${{ needs.backend-lint.result }}" != "success" ]; then
            echo "⚠️  Backend linting had issues (check logs)"
          fi
          if [ "${{ needs.frontend-lint.result }}" != "success" ]; then
            echo "⚠️  Frontend linting had issues (check logs)"
          fi
          if [ "${{ needs.frontend-type-check.result }}" != "success" ]; then
            echo "⚠️  Frontend type checking had issues (check logs)"
          fi

          # Build verification should be success if it completed (even with warnings)
          if [ "${{ needs.build-verification.result }}" == "success" ]; then
            echo "✅ Build verification passed"
          elif [ "${{ needs.build-verification.result }}" == "failure" ]; then
            echo "❌ Build verification failed - check logs above"
          else
            echo "⚠️  Build verification had issues but may have completed"
          fi

          echo ""
          echo "✅ CI pipeline completed (warnings are allowed, only critical failures block)"
