name: CD - Deploy to Ubuntu Server (Pull-based) (DEPRECATED - Use build-and-deploy.yml)

# DISABLED - Use build-and-deploy.yml instead
on:
  workflow_dispatch:
    # Disabled: push triggers removed to avoid conflicts
    inputs:
      image_tag:
        description: 'Docker image tag to deploy'
        required: false
        default: 'latest'
        type: string

env:
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/tamankehati' }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '5617' }}
  DOCKER_COMPOSE_FILE: docker-compose.pull.no-nginx.yml

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check deployment prerequisites
        id: check_prereqs
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ] || [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "⚠️ Deployment secrets not configured. Skipping deployment."
            echo "Configure DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY in repository settings"
            echo "deploy_skipped=true" >> $GITHUB_OUTPUT
          else
            echo "✅ Deployment prerequisites met"
            echo "deploy_skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Deployment skipped notice
        if: steps.check_prereqs.outputs.deploy_skipped == 'true'
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⚠️  Deployment Skipped"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "GitHub Secrets not configured yet."
          echo ""
          echo "To enable auto-deployment:"
          echo "1. Go to repository Settings → Secrets and variables → Actions"
          echo "2. Add these secrets:"
          echo "   - DEPLOY_HOST: 103.125.91.16"
          echo "   - DEPLOY_USER: ubuntu"
          echo "   - DEPLOY_SSH_KEY: (raw SSH private key content, not the server password)"
          echo "3. Push to main branch again"
          echo ""
          echo "See docs/deployment/CI_CD_SETUP.md for detailed guide"

      - name: Setup SSH key
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          if echo "$DEPLOY_SSH_KEY" | grep -qE '^[A-Za-z0-9+/]+=*$'; then
            echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/id_ed25519
          else
            printf '%s' "$DEPLOY_SSH_KEY" | perl -0pe 's/\r//g; s/\\n/\n/g' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null || { echo "SSH key validation failed"; exit 1; }

      - name: Add server to known hosts
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ env.DEPLOY_PORT }} -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "echo '✅ SSH connection successful'"

      - name: Deploy application (Pull-based)
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'DEPLOY_SCRIPT'
            set -e
            cd ${{ env.DEPLOY_PATH }}
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "🚀 Starting Deployment"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            
            # Pull latest code (optional, for config updates)
            if [ -d ".git" ]; then
              echo "📥 Pulling latest code..."
              git fetch origin main || true
              git checkout main || true
              git pull origin main || echo "⚠️  Git pull failed, continuing..."
            fi
            
            # Pull latest Docker images
            echo "🐳 Pulling latest Docker images..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} pull || {
              echo "❌ Failed to pull images"
              exit 1
            }
            
            # Stop existing containers gracefully
            echo "🛑 Stopping existing containers..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} down --timeout 30 || true
            
            # Start services
            echo "▶️  Starting services..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} up -d
            
            # Wait for services to be ready
            echo "⏳ Waiting for services to initialize..."
            sleep 15
            
            # Run database migrations
            echo "🗄️  Running database migrations..."
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} exec -T backend alembic upgrade head || echo "⚠️  Migration failed, but continuing..."
            
            echo ""
            echo "✅ Deployment completed!"
            DEPLOY_SCRIPT

      - name: Verify frontend bundle URL
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "🔎 Verifying frontend bundle URL configuration..."

            FRONTEND_CONTAINER=$(docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} ps -q frontend 2>/dev/null)
            if [ -z "$FRONTEND_CONTAINER" ]; then
              FRONTEND_CONTAINER=$(docker ps --filter "name=tamankehati-frontend" -q | head -n 1)
            fi

            if [ -z "$FRONTEND_CONTAINER" ]; then
              echo "⚠️  Frontend container not found, skipping bundle verification"
              exit 0
            fi

            docker exec "$FRONTEND_CONTAINER" sh -lc '
              if grep -R -q -E "103\.125\.91\.16:8080|127\.0\.0\.1:8081" /app/.next 2>/dev/null; then
                echo "❌ Stale frontend endpoint found in built bundle"
                exit 1
              fi
              echo "✅ No stale frontend endpoint found"
            '
          EOF

      - name: Health check - Backend
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "🏥 Checking backend health..."
            
            cd "${{ env.DEPLOY_PATH }}"
            BACKEND_PORT=$(grep -E '^BACKEND_PORT=' .env 2>/dev/null | tail -n 1 | cut -d '=' -f2-)
            BACKEND_URL="http://127.0.0.1:${BACKEND_PORT:-8000}/health"
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $BACKEND_URL > /dev/null; then
                echo "✅ Backend health check passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Backend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            echo "❌ Backend health check failed after $MAX_RETRIES attempts"
            exit 1
          EOF

      - name: Health check - Frontend
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "🌐 Checking frontend health..."
            
            cd "${{ env.DEPLOY_PATH }}"
            FRONTEND_PORT=$(grep -E '^FRONTEND_PORT=' .env 2>/dev/null | tail -n 1 | cut -d '=' -f2-)
            FRONTEND_URL="http://127.0.0.1:${FRONTEND_PORT:-3000}"
            MAX_RETRIES=10
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $FRONTEND_URL > /dev/null; then
                echo "✅ Frontend health check passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Frontend not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 5
            done
            
            echo "❌ Frontend health check failed after $MAX_RETRIES attempts"
            exit 1
          EOF

      - name: Health check - Public API
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            echo "🔍 Checking public API..."

            BASE_URL=$(grep -E '^NEXT_PUBLIC_SITE_URL=' .env 2>/dev/null | tail -n 1 | cut -d '=' -f2-)
            if [ -z "$BASE_URL" ]; then
              BASE_URL="https://tamankehati.tspdigital.id"
            fi
            BASE_URL="${BASE_URL%/}"
            API_URL="${BASE_URL}/health"
            MAX_RETRIES=5
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              if curl -f -s $API_URL > /dev/null; then
                echo "✅ Public API health check passed"
                exit 0
              fi
              
              RETRY_COUNT=$((RETRY_COUNT + 1))
              echo "⏳ Public API not ready yet, retrying... ($RETRY_COUNT/$MAX_RETRIES)"
              sleep 3
            done
            
            echo "⚠️  Public API health check failed, but continuing..."
            exit 0
          EOF

      - name: Verify deployment
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "📊 Deployment Verification"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "🐳 Docker containers status:"
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} ps
            echo ""
            echo "📋 Recent logs:"
            docker compose -f ${{ env.DOCKER_COMPOSE_FILE }} logs --tail=10
          EOF

      - name: Deployment summary
        if: steps.check_prereqs.outputs.deploy_skipped == 'false'
        run: |
          BASE_URL="https://tamankehati.tspdigital.id"
          if [ -f .env ]; then
            BASE_URL=$(grep -E '^NEXT_PUBLIC_SITE_URL=' .env | tail -n 1 | cut -d '=' -f2-)
          fi
          BASE_URL=${BASE_URL%/}
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment Completed Successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "🌐 Application URL: ${BASE_URL}"
          echo "🏥 Health Check: ${BASE_URL}/health"
          echo ""
          echo "All services should be running and healthy."
