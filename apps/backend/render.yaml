services:
  - type: web
    name: tamankehati-backend
    runtime: python
    region: singapore
    plan: starter
    branch: main
    rootDir: apps/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: SECRET_KEY
        generateValue: true
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: CORS_ORIGINS
        sync: false
      - key: UPLOAD_DIRECTORY
        value: /opt/render/project/src/uploads
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1

