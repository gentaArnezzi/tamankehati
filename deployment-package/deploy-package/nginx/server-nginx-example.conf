# Nginx Configuration untuk Server (BUKAN di container)
# Copy ini ke ~/dasmap_prod/apps/nginx/sites-enabled/tamankehati.conf
# Jika server sudah punya Nginx di service `go` dan ingin route ke Docker containers Taman Kehati
#
# SETUP:
# 1. Copy file ini ke: ~/dasmap_prod/apps/nginx/sites-enabled/tamankehati.conf
# 2. Update server_name dengan subdomain Anda
# 3. Restart service go: cd ~/dasmap_prod && docker compose restart go

# Option 1: Subdomain Routing (Recommended)
# Example: tamankehati.dasmap.co.id atau tamankehati.amilna.co.id
server {
    listen 80;
    server_name tamankehati.yourdomain.com;  # Ganti dengan subdomain Anda, contoh: tamankehati.dasmap.co.id

    # Redirect HTTP to HTTPS (if SSL setup)
    # return 301 https://$server_name$request_uri;

    # Frontend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend uploads
    location /uploads/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend docs
    location /docs {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

