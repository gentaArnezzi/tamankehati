# =============================================================================
# TAMAN KEHATI - PRODUCTION NGINX CONFIGURATION (ENTERPRISE-LEVEL SECURITY)
# =============================================================================
# Project: Taman Kehati (Long-term project until 2045)
# Security Level: Enterprise/Production
# Last Updated: 2025-11-04
# =============================================================================

# Rate Limiting Zones (DDoS Protection)
# =============================================================================
# Define rate limiting zones to prevent abuse and DDoS attacks
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=strict_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=2r/s;

# Connection limiting (prevent too many connections from single IP)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# =============================================================================
# MAIN SERVER BLOCK - TAMAN KEHATI APPLICATION
# =============================================================================
server {
    listen 80;
    server_name tamankehati.dasmap.co.id;

    # Security: Hide Nginx version
    server_tokens off;

    # Security: Maximum request body size (10MB for uploads)
    client_max_body_size 10M;

    # Security: Connection limits per IP
    limit_conn conn_limit 10;

    # Security: Timeout settings
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;

    # Security Headers (Applied to all responses)
    # =============================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy (CSP) - Adjust based on your frontend needs
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://tamankehati.dasmap.co.id; frame-ancestors 'self';" always;

    # Logging
    # =============================================================================
    access_log /var/log/nginx/tamankehati-access.log main;
    error_log /var/log/nginx/tamankehati-error.log warn;

    # =============================================================================
    # FRONTEND ROUTING (Next.js Application)
    # =============================================================================
    location / {
        # Rate limiting (general traffic)
        limit_req zone=general_limit burst=20 nodelay;
        
        # Proxy to Frontend Container
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # WebSocket support for Next.js
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Cache bypass for WebSocket
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts (important for Next.js)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # =============================================================================
    # BACKEND API ROUTING (FastAPI Application)
    # =============================================================================
    location /api/ {
        # Strict rate limiting for API (prevent abuse)
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy to Backend Container
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # CORS headers (if needed, but backend should handle this)
        # Don't override backend CORS - let backend handle it
    }

    # =============================================================================
    # FILE UPLOADS (Protected with rate limiting)
    # =============================================================================
    location /uploads/ {
        # Strict rate limiting for uploads (prevent abuse)
        limit_req zone=upload_limit burst=5 nodelay;
        
        # Proxy to Backend Container
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts (longer for file uploads)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Cache static uploads
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # Security: Only allow specific file types (handled by backend, but add header)
        add_header X-Content-Type-Options "nosniff" always;
    }

    # =============================================================================
    # API DOCUMENTATION (RESTRICTED ACCESS)
    # =============================================================================
    location /docs {
        # Strict rate limiting for docs
        limit_req zone=strict_limit burst=5 nodelay;
        
        # OPTIONAL: Restrict access to specific IPs (uncomment if needed)
        # allow 38.47.93.167;  # Server IP
        # allow 192.168.1.0/24;  # Internal network
        # deny all;
        
        # Proxy to Backend Container
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # =============================================================================
    # OPENAPI JSON (RESTRICTED ACCESS)
    # =============================================================================
    location /openapi.json {
        # Strict rate limiting
        limit_req zone=strict_limit burst=5 nodelay;
        
        # OPTIONAL: Restrict access to specific IPs (uncomment if needed)
        # allow 38.47.93.167;  # Server IP
        # allow 192.168.1.0/24;  # Internal network
        # deny all;
        
        # Proxy to Backend Container
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =============================================================================
    # HEALTH CHECK ENDPOINT (No rate limiting - for monitoring)
    # =============================================================================
    location /health {
        # No rate limiting - allow monitoring tools
        proxy_pass http://localhost:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;  # Don't log health checks
    }

    # =============================================================================
    # SECURITY: Block access to hidden files and sensitive paths
    # =============================================================================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block access to common sensitive files
    location ~ \.(env|git|svn|htaccess|htpasswd|ini|log|sh|sql|bak|backup|old)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # =============================================================================
    # ERROR PAGES
    # =============================================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

