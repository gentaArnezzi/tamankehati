<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Debug Profile Photo</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 { color: #4ec9b0; }
        h2 { color: #dcdcaa; margin-top: 30px; }
        button {
            background: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
            font-family: inherit;
        }
        button:hover { background: #1177bb; }
        .success { background: #107c10; }
        .success:hover { background: #0d5f0d; }
        .danger { background: #c42b1c; }
        .danger:hover { background: #9a2315; }
        pre {
            background: #252526;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            border-left: 3px solid #0e639c;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .status.success {
            background: #1e3a1e;
            border-left: 4px solid #107c10;
        }
        .status.error {
            background: #3a1e1e;
            border-left: 4px solid #c42b1c;
        }
        .status.warning {
            background: #3a3a1e;
            border-left: 4px solid #f9a825;
        }
        img {
            max-width: 200px;
            border: 2px solid #0e639c;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🔍 Profile Photo Debugger</h1>
    <p>Paste this URL in browser: <code>http://localhost:3000</code> (while logged in)</p>
    
    <h2>Step 1: Check Current State</h2>
    <button onclick="checkEverything()">🔍 Check Everything</button>
    <div id="checkResult"></div>

    <h2>Step 2: Fix Issues</h2>
    <button class="danger" onclick="clearAndReload()">🗑️ Clear Cache & Reload</button>
    <button class="success" onclick="forceRefresh()">🔄 Force Refresh User Data</button>

    <h2>Step 3: Test API</h2>
    <button onclick="testAPI()">🌐 Test /api/v1/users/me</button>
    <div id="apiResult"></div>

    <h2>Step 4: Preview Photo</h2>
    <button onclick="previewPhoto()">🖼️ Preview Profile Photo</button>
    <div id="photoPreview"></div>

    <script>
        async function checkEverything() {
            const result = document.getElementById('checkResult');
            let html = '';

            // Check 1: Token
            const token = localStorage.getItem('auth_token');
            if (token) {
                html += `<div class="status success">✅ Token found (${token.length} chars)</div>`;
            } else {
                html += `<div class="status error">❌ No token - You need to login!</div>`;
                result.innerHTML = html;
                return;
            }

            // Check 2: User data
            const userStr = localStorage.getItem('auth_user');
            if (!userStr) {
                html += `<div class="status error">❌ No user data in localStorage</div>`;
                result.innerHTML = html;
                return;
            }

            let user;
            try {
                user = JSON.parse(userStr);
                html += `<div class="status success">✅ User data found</div>`;
                html += `<pre>User Data:\n${JSON.stringify(user, null, 2)}</pre>`;
            } catch (e) {
                html += `<div class="status error">❌ Invalid user data: ${e.message}</div>`;
                result.innerHTML = html;
                return;
            }

            // Check 3: Profile picture URL
            if (user.profile_picture_url) {
                html += `<div class="status success">✅ Profile picture URL exists: ${user.profile_picture_url}</div>`;
            } else {
                html += `<div class="status error">❌ No profile_picture_url in user data!</div>`;
                html += `<div class="status warning">⚠️ Solution: You need to logout and login again</div>`;
            }

            result.innerHTML = html;
        }

        async function testAPI() {
            const result = document.getElementById('apiResult');
            const token = localStorage.getItem('auth_token');
            
            if (!token) {
                result.innerHTML = '<div class="status error">❌ No token found. Login first!</div>';
                return;
            }

            result.innerHTML = '<div class="status">⏳ Testing API...</div>';

            try {
                const response = await fetch('http://localhost:8000/api/v1/users/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                let html = '<div class="status success">✅ API Response received</div>';
                html += `<pre>Response:\n${JSON.stringify(data, null, 2)}</pre>`;
                
                if (data.profile_picture_url) {
                    html += `<div class="status success">✅ API returns profile_picture_url: ${data.profile_picture_url}</div>`;
                    html += `<div class="status warning">⚠️ API has photo but localStorage doesn't? Clear cache and login again!</div>`;
                } else {
                    html += `<div class="status error">❌ API doesn't return profile_picture_url</div>`;
                    html += `<div class="status warning">⚠️ Backend issue: Check if backend is updated and restarted</div>`;
                }
                
                result.innerHTML = html;
            } catch (error) {
                result.innerHTML = `<div class="status error">❌ Error: ${error.message}</div>`;
            }
        }

        async function previewPhoto() {
            const result = document.getElementById('photoPreview');
            const userStr = localStorage.getItem('auth_user');
            
            if (!userStr) {
                result.innerHTML = '<div class="status error">❌ No user data</div>';
                return;
            }

            let user;
            try {
                user = JSON.parse(userStr);
            } catch (e) {
                result.innerHTML = `<div class="status error">❌ Invalid user data</div>`;
                return;
            }

            if (!user.profile_picture_url) {
                result.innerHTML = '<div class="status error">❌ No profile_picture_url in user data</div>';
                return;
            }

            const photoUrl = `http://localhost:8000${user.profile_picture_url}`;
            result.innerHTML = `
                <div class="status success">✅ Attempting to load photo from: ${photoUrl}</div>
                <img src="${photoUrl}" alt="Profile Photo" onload="this.nextElementSibling.innerHTML='✅ Image loaded successfully!'" onerror="this.nextElementSibling.innerHTML='❌ Failed to load image. Check if file exists.'">
                <div class="status"></div>
            `;
        }

        function clearAndReload() {
            if (confirm('This will clear all localStorage and reload the page. You will need to login again. Continue?')) {
                localStorage.clear();
                alert('✅ Cache cleared! Redirecting to login...');
                window.location.href = 'http://localhost:3000/login';
            }
        }

        async function forceRefresh() {
            const token = localStorage.getItem('auth_token');
            
            if (!token) {
                alert('❌ No token found. Please login first.');
                return;
            }

            try {
                const response = await fetch('http://localhost:8000/api/v1/users/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const userData = await response.json();
                
                // Map to User format
                const user = {
                    id: String(userData.id),
                    email: userData.email,
                    nama: userData.display_name || userData.email,
                    display_name: userData.display_name,
                    role: userData.role,
                    park_id: userData.park_id,
                    profile_picture_url: userData.profile_picture_url,
                    is_active: userData.is_active,
                    created_at: userData.created_at,
                    updated_at: userData.updated_at
                };
                
                localStorage.setItem('auth_user', JSON.stringify(user));
                alert('✅ User data refreshed! Reloading page...');
                window.location.reload();
            } catch (error) {
                alert('❌ Failed to refresh: ' + error.message);
            }
        }

        // Auto-check on load
        window.addEventListener('load', () => {
            setTimeout(checkEverything, 500);
        });
    </script>
</body>
</html>
