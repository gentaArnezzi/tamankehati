services:
  # Backend API
  - type: web
    name: tamankehati-backend
    runtime: python
    plan: free
    branch: main
    rootDir: apps/backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
        # Set this to your Railway database URL (postgresql+asyncpg://...)
      - key: DATABASE_URL_SYNC
        sync: false
        # Set this to your Railway database URL (postgresql://...)
      - key: SECRET_KEY
        generateValue: true
        # Auto-generated secure secret key
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        sync: false
        # Set this to your Vercel frontend URL
      - key: UPLOAD_DIRECTORY
        value: /tmp/uploads
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FORMAT
        value: json
    autoDeploy: true

# NOTE: Frontend deployed to Vercel, Database deployed to Railway
# Free tier limitations:
# - No disk storage (uploads stored in /tmp - ephemeral)
# - 1 worker only
# For persistent storage, upgrade to paid plan or use cloud storage (S3, Cloudinary)

