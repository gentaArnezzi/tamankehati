# Docker Compose for Server Deployment WITHOUT Nginx Container
# Use this when Nginx is already running on the server
# Nginx on server will route to containers on ports 3000 and 8000

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tamankehati-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kehati_db}
      POSTGRES_USER: ${POSTGRES_USER:-kehati_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kehati_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kehati_user} -d ${POSTGRES_DB:-kehati_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tamankehati-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: tamankehati-redis-prod
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tamankehati-network
    restart: unless-stopped

  # Backend API - Pull from registry
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME:-yourusername}/tamankehati-backend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: tamankehati-backend-prod
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kehati_user}:${POSTGRES_PASSWORD:-kehati_password}@postgres:5432/${POSTGRES_DB:-kehati_db}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-kehati_user}:${POSTGRES_PASSWORD:-kehati_password}@postgres:5432/${POSTGRES_DB:-kehati_db}
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Security
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-${CORS_ORIGINS:-http://localhost:3000}}
      
      # Environment
      ENVIRONMENT: production
      DEBUG: "false"
      
      # Upload
      UPLOAD_DIRECTORY: /app/uploads
      
      # Image URL Configuration (for image upload fix)
      BASE_URL: ${BASE_URL:-}
      API_BASE_URL: ${API_BASE_URL:-}
      BACKEND_URL: ${BACKEND_URL:-}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      
      # Ollama Configuration
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2:1.5b}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tamankehati-network
    restart: unless-stopped

  # Frontend Next.js - Pull from registry
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME:-yourusername}/tamankehati-frontend:${IMAGE_TAG:-latest}
    platform: linux/amd64
    container_name: tamankehati-frontend-prod
    environment:
      # API Configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://YOUR_SERVER_IP:8000}
      
      # Environment
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tamankehati-network
    restart: unless-stopped

  # Ollama LLM Service (Optional)
  # Auto pre-loads model on container start to prevent timeout
  ollama:
    image: ollama/ollama:latest
    container_name: tamankehati-ollama-prod
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2:1.5b}
      # Performance optimization for server
      OLLAMA_NUM_PARALLEL: 1  # Limit concurrent requests (1 = faster per request)
      OLLAMA_MAX_LOADED_MODELS: 1  # Keep only 1 model loaded (faster)
      OLLAMA_KEEP_ALIVE: 10m  # Keep model in memory for 10 minutes (faster subsequent requests)
      OLLAMA_NUM_THREAD: 4  # Use 4 CPU threads (match cpus: 4.0)
    networks:
      - tamankehati-network
    restart: unless-stopped
    mem_limit: 6g
    cpus: 4.0
    # Auto pre-load model after container start
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama serve &
      OLLAMA_PID=$$!
      sleep 15 &&
      echo "Checking if model $${OLLAMA_MODEL:-qwen2:1.5b} exists..." &&
      if ! ollama list 2>/dev/null | grep -q "$${OLLAMA_MODEL:-qwen2:1.5b}"; then
        echo "Model not found, pulling $${OLLAMA_MODEL:-qwen2:1.5b}..." &&
        ollama pull $${OLLAMA_MODEL:-qwen2:1.5b} || echo "Pull failed, continuing..."
      fi &&
      echo "Pre-loading model $${OLLAMA_MODEL:-qwen2:1.5b} to memory..." &&
      timeout 60 ollama run $${OLLAMA_MODEL:-qwen2:1.5b} "Preload" > /dev/null 2>&1 || echo "Pre-load timeout, but continuing..." &&
      echo "✅ Ollama ready with model pre-loaded" &&
      wait $$OLLAMA_PID
    healthcheck:
      # Use ollama list instead of curl (curl not available in Ollama container)
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 120s  # Give time for model pull and pre-load

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
  ollama_data:
    driver: local

networks:
  tamankehati-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16  # Explicit subnet to avoid conflict with dasmap_prod_go-net (172.27.0.0/16)
          gateway: 172.28.0.1

