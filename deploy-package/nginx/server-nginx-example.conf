# Nginx Configuration untuk Server (BUKAN di container)
# Copy ini ke ~/dasmap_prod/apps/nginx/sites-enabled/tamankehati.conf
# Jika server sudah punya Nginx di service `go` dan ingin route ke Docker containers Taman Kehati
#
# SETUP:
# 1. Copy file ini ke: ~/dasmap_prod/apps/nginx/sites-enabled/tamankehati.conf
# 2. Update server_name dengan subdomain Anda
# 3. Restart service go: cd ~/dasmap_prod && docker compose restart go

# Option 1: Subdomain Routing (Recommended)
# Example: tamankehati.dasmap.co.id atau tamankehati.amilna.co.id
server {
    listen 80;
    server_name tamankehati.yourdomain.com;  # Ganti dengan subdomain Anda, contoh: tamankehati.dasmap.co.id

    # Redirect HTTP to HTTPS (if SSL setup)
    # return 301 https://$server_name$request_uri;

    # Frontend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API - AI endpoints dengan timeout lebih lama (FIX 504 Gateway Timeout)
    # ⚠️ PENTING: Letakkan SEBELUM location /api/ yang umum (lebih spesifik)
    location ~ ^/api/v1/ai/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # ⚠️ PENTING: Timeout diperpanjang untuk AI generation
        # Backend timeout: 120s (small models) / 180s (large models)
        # Nginx timeout harus lebih lama dari backend timeout
        proxy_connect_timeout 200s;
        proxy_send_timeout 200s;
        proxy_read_timeout 200s;  # PENTING: harus lebih lama dari backend timeout
        
        # Buffers untuk response yang besar
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
    }

    # Backend API - General endpoints
    location /api/ {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts untuk general API (bisa lebih pendek)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Backend uploads
    location /uploads/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend docs
    location /docs {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

