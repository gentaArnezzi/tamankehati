# Nginx Configuration for Taman Kehati - Domain-based Routing with Security
# This file should be copied to ~/dasmap_prod/apps/nginx/sites-enabled/tamankehati.conf
# It will be automatically mounted to the 'go' container at /etc/nginx/sites-enabled/tamankehati.conf
#
# After copying, reload Nginx in the container:
#   docker exec -it dasmap_prod-go-1 nginx -t
#   docker exec -it dasmap_prod-go-1 nginx -s reload
#
# URL Access: https://tamankehati.dasmap.co.id (or http://tamankehati.dasmap.co.id)
#
# Prerequisites:
# 1. Setup DNS A record: tamankehati.dasmap.co.id -> 38.47.93.167
# 2. Update NEXT_PUBLIC_API_URL in frontend build
# 3. Setup SSL (optional but recommended)
#
# Security Features:
# - Rate limiting for API endpoints
# - Hide API docs from public
# - Security headers
# - CORS-ready configuration

# Rate limiting zones (must be in http context, but can be in server block for single-server setup)
# Note: If you have multiple server blocks, move this to http context in nginx.conf
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

server {
    listen 80;
    # listen 443 ssl;  # Uncomment when SSL is configured
    server_name tamankehati.dasmap.co.id 38.47.93.167;

    # SSL Configuration (uncomment when SSL is configured)
    # ssl_certificate /etc/letsencrypt/live/tamankehati.dasmap.co.id/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tamankehati.dasmap.co.id/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # if ($scheme != "https") {
    #     return 301 https://$server_name$request_uri;
    # }

    # Frontend (Next.js)
    location / {
        limit_req zone=general_limit burst=20 nodelay;
        
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Add security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # Backend API with rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Add security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # Backend uploads
    location /uploads/ {
        limit_req zone=general_limit burst=10 nodelay;
        
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d; # Cache static assets
        add_header Cache-Control "public, immutable";
        
        # Add security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
    }

    # Backend docs (Swagger UI) - Restrict access to internal only
    location /docs {
        # Allow only from localhost and Docker network
        allow 127.0.0.1;
        allow 172.27.0.0/16;  # Docker network
        deny all;
        
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend OpenAPI JSON - Restrict access to internal only
    location /openapi.json {
        # Allow only from localhost and Docker network
        allow 127.0.0.1;
        allow 172.27.0.0/16;  # Docker network
        deny all;
        
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint - proxy to backend
    location /health {
        proxy_pass http://localhost:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }
    
    # Health check endpoint with /api prefix - proxy to backend /health
    location /api/health {
        proxy_pass http://localhost:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

