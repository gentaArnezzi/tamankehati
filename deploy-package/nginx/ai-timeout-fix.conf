# Nginx Configuration untuk Fix 504 Gateway Timeout pada AI Endpoints
# 
# INSTRUKSI:
# 1. Copy location block di bawah ini ke dalam server block Nginx Anda
# 2. Letakkan SEBELUM location /api/ yang umum (agar lebih spesifik)
# 3. Reload Nginx: sudo nginx -t && sudo systemctl reload nginx
#
# Atau gunakan script: scripts/fix-nginx-ai-timeout.sh

# Location block khusus untuk AI endpoints dengan timeout lebih lama
location ~ ^/api/v1/ai/ {
    # Rate limiting (optional, bisa disesuaikan)
    limit_req zone=api_limit burst=5 nodelay;
    
    proxy_pass http://backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    
    # ⚠️ PENTING: Timeout diperpanjang untuk AI generation
    # Backend timeout: 120s (small models) / 180s (large models)
    # Nginx timeout harus lebih lama dari backend timeout
    proxy_connect_timeout 200s;  # Connection timeout: 200 detik
    proxy_send_timeout 200s;     # Send timeout: 200 detik
    proxy_read_timeout 200s;     # Read timeout: 200 detik (PENTING!)
    
    # Buffers untuk response yang besar
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;
    
    # Disable proxy buffering untuk streaming (optional)
    # proxy_buffering off;
    
    # Keep-alive untuk connection yang lama
    proxy_set_header Connection "";
    keepalive_timeout 200s;
}

# Jika menggunakan Docker container name langsung:
# location ~ ^/api/v1/ai/ {
#     proxy_pass http://tamankehati-backend-prod:8000;
#     # ... (sama seperti di atas)
# }

# Jika menggunakan IP:port langsung:
# location ~ ^/api/v1/ai/ {
#     proxy_pass http://127.0.0.1:8000;
#     # ... (sama seperti di atas)
# }






