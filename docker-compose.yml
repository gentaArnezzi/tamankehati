services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kehati-postgres
    environment:
      POSTGRES_DB: kehati_db
      POSTGRES_USER: kehati_user
      POSTGRES_PASSWORD: kehati_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kehati_user -d kehati_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kehati-network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: kehati-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kehati-network

  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: kehati-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kehati-network
    # Optional: Set environment to limit GPU usage
    # environment:
    #   - OLLAMA_HOST=0.0.0.0
    #   - OLLAMA_NUM_PARALLEL=1
    #   - OLLAMA_MAX_LOADED_MODELS=1

  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: kehati-backend
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://kehati_user:kehati_password@postgres:5432/kehati_db
      DATABASE_URL_SYNC: postgresql://kehati_user:kehati_password@postgres:5432/kehati_db
      
      # Redis
      REDIS_URL: redis://redis:6379
      
      # Ollama AI
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2:1.5b}
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      
      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-${CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}}
      
      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      
      # Upload
      UPLOAD_DIRECTORY: ${UPLOAD_DIRECTORY:-/app/uploads}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FORMAT: ${LOG_FORMAT:-json}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./apps/backend:/app
      - /app/__pycache__
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kehati-network

  # Frontend Next.js
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: development
    container_name: kehati-frontend
    environment:
      # API Configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000}
      
      # Environment
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - kehati-network

  # Database Migration Service
  migrate:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: development
    container_name: kehati-migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://kehati_user:kehati_password@postgres:5432/kehati_db
      DATABASE_URL_SYNC: postgresql://kehati_user:kehati_password@postgres:5432/kehati_db
    volumes:
      - ./apps/backend:/app
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kehati-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  kehati-network:
    driver: bridge
